<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servis Elektronik - Fesdio Service</title>

<style>
body {
    font-family: "Times New Roman", serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #007bff;
    color: white;
    text-align: center;
    padding: 20px;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    margin-top: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

/* INPUT */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    background: #007bff;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

button:hover {
    background: #0056b3;
}

/* LIST */
.service-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
}

.service-item {
    background: #e9f2ff;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #007bff;
    color: white;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Fesdio Service</h1>
    <p>Jasa Servis Laptop, HP, AC, Mesin Cuci & Elektronik</p>
</header>

<div class="container">

    <!-- LIST LAYANAN -->
    <div class="card">
        <h2>Layanan Kami</h2>
        <div class="service-list">
            <div class="service-item">Laptop</div>
            <div class="service-item">HP</div>
            <div class="service-item">AC</div>
            <div class="service-item">Mesin Cuci</div>
            <div class="service-item">TV</div>
            <div class="service-item">Elektronik Lainnya</div>
        </div>
    </div>

    <!-- FORM PEMESANAN -->
    <div class="card">
        <h2>Form Pemesanan</h2>

        <form onsubmit="pesan(event)">
            <label>Nama</label>
            <input type="text" required>

            <label>No HP</label>
            <input type="text" required>

            <label>Alamat</label>
            <textarea required></textarea>

            <label>Jenis Servis</label>
            <select required>
                <option value="">-- Pilih --</option>
                <option>Laptop</option>
                <option>HP</option>
                <option>AC</option>
                <option>Mesin Cuci</option>
                <option>Lainnya</option>
            </select>

            <label>Keluhan</label>
            <textarea required></textarea>

            <label>Metode Pembayaran</label>
            <select required>
                <option value="">-- Pilih --</option>
                <option>DANA</option>
                <option>Transfer Bank</option>
            </select>

            <button type="submit">Pesan Sekarang</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 Fesdio Service</p>
</footer>

<script>
function pesan(event){
    event.preventDefault();
    alert("Pesanan berhasil dikirim! Admin akan menghubungi Anda.");
}
</script>

</body>
</html>
