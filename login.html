<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>NUTRIKID - Login</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="box">
    <h2>NUTRIKID</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
