<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUTRIKID Login</title>

<style>
*{margin:0;padding:0;}
.main{
    width:100%;
    height:100vh;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1502082553048-f009c37129b9');
    background-position:center;
    background-size:cover;
}
.navbar{width:1200px;margin:auto;height:75px;}
.logo{color:#ff7200;font-size:35px;padding:20px;}
.menu ul{display:flex;list-style:none;}
.menu ul li{margin:20px;}
.menu ul li a{color:white;text-decoration:none;}

.content{
    width:1200px;
    margin:auto;
    color:white;
    position:relative;
}
.content h1{
    margin-top:10%;
    font-size:50px;
}
.content span{color:#ff7200;}

.form{
    width:250px;
    height:350px;
    background:rgba(0,0,0,0.8);
    position:absolute;
    top:50px;
    right:0;
    border-radius:10px;
    padding:20px;
}
.form h2{
    background:white;
    color:#ff7200;
    text-align:center;
    padding:8px;
    border-radius:10px;
}
.form input{
    width:100%;
    margin-top:20px;
    padding:10px;
    background:transparent;
    border:none;
    border-bottom:1px solid #ff7200;
    color:white;
}
.btnn{
    width:100%;
    margin-top:20px;
    padding:10px;
    background:#ff7200;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="main">
<div class="navbar">
<h2 class="logo">NUTRIKID</h2>
</div>

<div class="content">
<h1>Monitoring <br><span>Pertumbuhan Anak</span></h1>
<p>Membantu memantau kesehatan anak secara mudah dan cepat 🦁</p>

<div class="form">
<h2>Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button class="btnn" onclick="window.location='dashboard.html'">Login</button>
</div>

</div>
</div>

</body>
</html>
