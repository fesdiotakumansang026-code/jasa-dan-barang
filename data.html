<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Anak</title>

<style>
*{
    margin:0;
    padding:0;
}

/* BACKGROUND */
.main{
    width:100%;
    height:100vh;
    background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1502082553048-f009c37129b9');
    background-position:center;
    background-size:cover;
}

/* NAVBAR */
.navbar{
    width:1200px;
    margin:auto;
    height:75px;
}

.logo{
    color:#ff7200;
    font-size:30px;
    padding-top:20px;
}

/* CONTENT */
.content{
    width:1200px;
    margin:auto;
    color:white;
    padding-top:50px;
}

/* TABLE BOX */
.table-box{
    background: rgba(0,0,0,0.8);
    padding:20px;
    border-radius:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#ff7200;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:rgba(255,255,255,0.1);
}

/* BUTTON */
button{
    padding:10px;
    margin-top:20px;
    background:#ff7200;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="main">

<div class="navbar">
<h2 class="logo">NUTRIKID</h2>
</div>

<div class="content">

<h1>📊 Data Anak</h1>
<p>Monitoring pertumbuhan siswa 🦁</p>

<div class="table-box">

<table>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Tinggi</th>
<th>Berat</th>
<th>Status</th>
</tr>

<tr>
<td>Budi</td>
<td>1A</td>
<td>120 cm</td>
<td>25 kg</td>
<td style="color:green;">Normal</td>
</tr>

<tr>
<td>Siti</td>
<td>2B</td>
<td>110 cm</td>
<td>18 kg</td>
<td style="color:red;">Stunting</td>
</tr>

<tr>
<td>Andi</td>
<td>3C</td>
<td>130 cm</td>
<td>30 kg</td>
<td style="color:green;">Normal</td>
</tr>

</table>

</div>

<button onclick="window.location='dashboard.html'">⬅ Kembali</button>

</div>
</div>

</body>
</html>
